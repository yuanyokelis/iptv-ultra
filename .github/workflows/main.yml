name: Build IPTV Ultra

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Repository
        run: |
          echo "===== REPO ====="
          find .

      - name: Check Files
        run: |
          echo "===== FILES ====="
          find files -type f

      - name: Build Package
        run: |
          mkdir -p ipk_build
          cp -rv files/* ipk_build/

          echo "===== BUILD DIR ====="
          find ipk_build

          tar -czf data.tar.gz -C ipk_build .

          ls -lh data.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: debug-package
          path: data.tar.gz
