name: Build OpenWrt Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 顺应 24 年新规，强制使用 Node.js 24 消除 Warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup OpenWrt SDK Environment
        run: |
          sudo apt-get update
          # 修正了 clan -> clang 的拼写错误，确保不会再报 exit code 100
          sudo apt-get install -y build-essential clang gawk gettext git libncurses5-dev libssl-dev python3-distutils zlib1g-dev

      - name: Package IPK/APK
        run: |
          mkdir -p ipk_build/CONTROL
          
          cat <<EOF > ipk_build/CONTROL/control
          Package: luci-app-iptv-ultra
          Version: 1.0.0-1
          Architecture: all
          Maintainer: IPTV Developer
          Depends: python3, ffmpeg, ffprobe
          Description: IPTV Ultra Pro system for OpenWrt
          EOF
          
          # 检查并确保复制路径正确
          if [ -d "files" ]; then
            cp -r files/* ipk_build/
          else
            echo "Error: files directory not found!"
            exit 1
          fi
          
          tar -czf control.tar.gz -C ipk_build/CONTROL .
          rm -rf ipk_build/CONTROL
          tar -czf data.tar.gz -C ipk_build .
          echo "2.0" > debian-binary
          
          tar -czf luci-app-iptv-ultra_1.0.0_all.ipk debian-binary control.tar.gz data.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-iptv-ultra-packages
          path: "*.ipk"
