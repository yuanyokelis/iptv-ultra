name: Build & Release IPTV Ultra Pro
on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK + IPK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK and IPK packages
        shell: bash
        run: |
          set -eux
          PKG_DIR="luci-app-iptv-ultra"
          VERSION="2.0.0"

          # Create structure
          install -d "$PKG_DIR/usr/bin" \
                    "$PKG_DIR/etc/config" \
                    "$PKG_DIR/etc/init.d" \
                    "$PKG_DIR/usr/lib/lua/luci/controller" \
                    "$PKG_DIR/usr/lib/lua/luci/model/cbi/iptv-ultra" \
                    "$PKG_DIR/www/iptv"

          # Copy files
          cp files/usr/bin/iptv-ultra "$PKG_DIR/usr/bin/"
          cp files/usr/bin/iptv-probe.py "$PKG_DIR/usr/bin/"
          cp files/etc/config/iptv-ultra "$PKG_DIR/etc/config/"
          cp files/etc/init.d/iptv-ultra "$PKG_DIR/etc/init.d/"
          cp files/usr/lib/lua/luci/controller/iptv-ultra.lua "$PKG_DIR/usr/lib/lua/luci/controller/"
          cp files/usr/lib/lua/luci/model/cbi/iptv-ultra/settings.lua "$PKG_DIR/usr/lib/lua/luci/model/cbi/iptv-ultra/"
          chmod 755 "$PKG_DIR/usr/bin/iptv-ultra" "$PKG_DIR/usr/bin/iptv-probe.py" "$PKG_DIR/etc/init.d/iptv-ultra"

          # APK package
          (cd "$PKG_DIR" && tar -czf "../${PKG_DIR}_${VERSION}_all.apk" .)
          echo "APK done: $(wc -c < "${PKG_DIR}_${VERSION}_all.apk") bytes"

          # IPK package
          install -d ipk-build/DEBIAN
          printf 'Package: luci-app-iptv-ultra\nVersion: %s-1\nArchitecture: all\nMaintainer: IPTV Ultra Team\nPriority: optional\nSection: luci\nDescription: IPTV Ultra Pro - Smart IPTV source optimizer\nDepends: python3-light, ffmpeg, luci-base, luci-compat\n' "$VERSION" > ipk-build/DEBIAN/control
          echo "/etc/config/iptv-ultra" > ipk-build/DEBIAN/conffiles
          printf '#!/bin/sh\nif command -v uci >/dev/null 2>&1; then uci commit iptv-ultra 2>/dev/null || true; fi\n/etc/init.d/iptv-ultra enable 2>/dev/null || true\n/etc/init.d/iptv-ultra start 2>/dev/null || true\nexit 0\n' > ipk-build/DEBIAN/postinst
          chmod 755 ipk-build/DEBIAN/postinst
          cp -r "$PKG_DIR"/usr ipk-build/
          cp -r "$PKG_DIR"/etc ipk-build/
          cp -r "$PKG_DIR"/www ipk-build/

          (cd ipk-build && \
           echo "2.0" > debian-binary && \
           tar -czf control.tar.gz ./DEBIAN/ && \
           tar -czf data.tar.gz usr/ etc/ www/ && \
           ar -rcs "../${PKG_DIR}_${VERSION}-1_all.ipk" debian-binary control.tar.gz data.tar.gz)
          echo "IPK done: $(wc -c < "${PKG_DIR}_${VERSION}-1_all.ipk") bytes"
          ls -lh *.apk *.ipk

      - name: Verify APK
        run: tar -tzf luci-app-iptv-ultra_2.0.0_all.apk | sort

      - name: Verify IPK
        run: |
          ar -p luci-app-iptv-ultra_2.0.0-1_all.ipk control.tar.gz | tar -xzf - -O ./control
          ar -p luci-app-iptv-ultra_2.0.0-1_all.ipk data.tar.gz | tar -tzf - | head -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-iptv-ultra-apk
          path: "*.apk"
          if-no-files-found: error

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-iptv-ultra-ipk
          path: "*.ipk"
          if-no-files-found: error

  sdk-build:
    name: SDK-Build-${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86-64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          - name: aarch64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/armsr/armv8/openwrt-sdk-24.10.0-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.xz
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libncurses5-dev zlib1g-dev gawk gettext libssl-dev xsltproc wget file unzip

      - name: Extract SDK
        run: |
          wget -q "${{ matrix.target.sdk_url }}" -O sdk.tar.xz
          SDK_DIR=$(tar -tf sdk.tar.xz | head -1 | cut -d/ -f1)
          tar -xf sdk.tar.xz
          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Add package to SDK
        run: |
          mkdir -p "$SDK_DIR/package/luci-app-iptv-ultra"
          rsync -a source/ "$SDK_DIR/package/luci-app-iptv-ultra/" --exclude=.git
          cd "$SDK_DIR"
          make defconfig 2>&1 | tail -10
          echo "CONFIG_PACKAGE_luci-app-iptv-ultra=y" >> .config
          make defconfig 2>&1 | tail -5

      - name: Compile
        run: |
          cd "$SDK_DIR"
          make package/luci-app-iptv-ultra/compile V=s 2>&1 | tail -50

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find "$SDK_DIR/bin" -name "*iptv-ultra*.ipk" -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -la artifacts/ || echo "No artifacts"

      - name: Upload SDK IPK
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.target.name }}
          path: artifacts/
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - uses: softprops/action-gh-release@v2
        with:
          name: IPTV Ultra Pro ${{ github.ref_name }}
          body: |
            # IPTV Ultra Pro ${{ github.ref_name }}

            ## Packages

            - `luci-app-iptv-ultra_*.apk` — APK (OpenWrt 24+)
            - `luci-app-iptv-ultra_*.ipk` — IPK (opkg)

            ## Install

            ```bash
            apk add luci-app-iptv-ultra*.apk
            opkg install luci-app-iptv-ultra*.ipk
            ```

            ## Usage

            1. LuCI -> Services -> IPTV Ultra Pro
            2. Select countries -> Update
            3. TVBox subscribe: http://router-ip/iptv/best.m3u
          files: release-artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
