name: Build & Release IPTV Ultra Pro
on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK + IPK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq binutils tar gzip

      - name: Build packages
        run: |
          set -x
          VERSION="2.0.0"
          DIR="luci-app-iptv-ultra"

          for d in usr/bin etc/config etc/init.d \
                   usr/lib/lua/luci/controller \
                   usr/lib/lua/luci/model/cbi/iptv-ultra \
                   www/iptv; do mkdir -p "$DIR/$d"; done

          cp files/usr/bin/iptv-ultra       "$DIR/usr/bin/"
          cp files/usr/bin/iptv-probe.py    "$DIR/usr/bin/"
          cp files/etc/config/iptv-ultra    "$DIR/etc/config/"
          cp files/etc/init.d/iptv-ultra    "$DIR/etc/init.d/"
          cp files/usr/lib/lua/luci/controller/iptv-ultra.lua  "$DIR/usr/lib/lua/luci/controller/"
          cp files/usr/lib/lua/luci/model/cbi/iptv-ultra/settings.lua  "$DIR/usr/lib/lua/luci/model/cbi/iptv-ultra/"
          chmod 755 "$DIR/usr/bin/iptv-ultra" "$DIR/usr/bin/iptv-probe.py" "$DIR/etc/init.d/iptv-ultra"

          # APK
          (cd "$DIR" && tar -czf "../${DIR}_${VERSION}_all.apk" .)

          # IPK
          mkdir -p ipk/DEBIAN
          printf 'Package: luci-app-iptv-ultra\nVersion: %s-1\nArchitecture: all\nMaintainer: IPTV Ultra Team\nPriority: optional\nSection: luci\nDescription: IPTV Ultra Pro\nDepends: python3-light, ffmpeg, luci-base, luci-compat\n' "$VERSION" > ipk/DEBIAN/control
          echo "/etc/config/iptv-ultra" > ipk/DEBIAN/conffiles
          printf '#!/bin/sh\nif command -v uci 2>/dev/null; then uci commit iptv-ultra 2>/dev/null || true; fi\n/etc/init.d/iptv-ultra enable 2>/dev/null || true\n/etc/init.d/iptv-ultra start 2>/dev/null || true\nexit 0\n' > ipk/DEBIAN/postinst
          chmod 755 ipk/DEBIAN/postinst
          cp -r "$DIR/usr" ipk/
          cp -r "$DIR/etc" ipk/
          cp -r "$DIR/www" ipk/

          cd ipk
          echo "2.0" > debian-binary
          tar -czf control.tar.gz ./DEBIAN/
          tar -czf data.tar.gz usr/ etc/ www/
          ar -rcs "../${DIR}_${VERSION}-1_all.ipk" debian-binary control.tar.gz data.tar.gz
          cd ..
          ls -lh *.apk *.ipk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-iptv-ultra-apk
          path: "*.apk"
          if-no-files-found: error

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-iptv-ultra-ipk
          path: "*.ipk"
          if-no-files-found: error

  sdk:
    name: SDK-${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: x86-64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          - name: aarch64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/armsr/armv8/openwrt-sdk-24.10.0-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.xz
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - name: Install deps
        run: sudo apt-get install -y -qq build-essential libncurses5-dev zlib1g-dev gawk gettext libssl-dev xsltproc wget file unzip python3 rsync

      - name: Extract SDK
        run: |
          wget -q "${{ matrix.target.sdk_url }}" -O sdk.tar.xz
          SDK_DIR=$(tar -tf sdk.tar.xz | head -1 | cut -d/ -f1)
          tar -xf sdk.tar.xz
          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Add package and configure
        run: |
          mkdir -p "$SDK_DIR/package/luci-app-iptv-ultra"
          rsync -a source/ "$SDK_DIR/package/luci-app-iptv-ultra/" --exclude=.git
          cd "$SDK_DIR"
          ./scripts/feeds update -i 2>/dev/null || true
          ./scripts/feeds install luci-base 2>/dev/null || true
          ./scripts/feeds install luci-compat 2>/dev/null || true
          make defconfig 2>&1 | tail -5
          echo "CONFIG_PACKAGE_luci-app-iptv-ultra=y" >> .config
          make defconfig 2>&1 | tail -5

      - name: Compile
        run: |
          cd "$SDK_DIR"
          make package/luci-app-iptv-ultra/compile V=s 2>&1 | tail -80 || true
          find bin -name "*iptv-ultra*.ipk" -type f 2>/dev/null || echo "No IPK found"
          find bin -name "*.ipk" -type f 2>/dev/null | head -5

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.target.name }}
          path: artifacts/
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - uses: softprops/action-gh-release@v2
        with:
          name: IPTV Ultra Pro ${{ github.ref_name }}
          body: |
            # IPTV Ultra Pro ${{ github.ref_name }}
            ## Packages
            - APK (OpenWrt 24+): luci-app-iptv-ultra_*.apk
            - IPK (opkg): luci-app-iptv-ultra_*.ipk
            ## Install
            ```
            apk add luci-app-iptv-ultra*.apk
            opkg install luci-app-iptv-ultra*.ipk
            ```
          files: release-artifacts/**/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
